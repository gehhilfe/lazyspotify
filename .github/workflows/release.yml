name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      source_bundle_name: ${{ steps.meta.outputs.source_bundle_name }}
      source_bundle_dir: ${{ steps.meta.outputs.source_bundle_dir }}
      build_date: ${{ steps.meta.outputs.build_date }}
      source_commit: ${{ steps.meta.outputs.source_commit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Validate release manifest
        run: scripts/release/validate-manifest.sh --require-daemon-tag

      - name: Capture release metadata
        id: meta
        run: |
          echo "release_tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          echo "source_bundle_name=lazyspotify-v${GITHUB_REF_NAME#v}-src.tar.gz" >> "$GITHUB_OUTPUT"
          echo "source_bundle_dir=lazyspotify-v${GITHUB_REF_NAME#v}-src" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "source_commit=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create bundled source archive
        run: scripts/release/create-source-bundle.sh --output-dir dist

      - name: Upload source bundle
        uses: actions/upload-artifact@v4
        with:
          name: source-bundle
          path: dist/*.tar.gz

  build-linux:
    needs: prepare
    strategy:
      matrix:
        include:
          - series: noble
            container: ubuntu:24.04
          - series: questing
            container: ubuntu:25.10
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}
    name: build-linux (${{ matrix.series }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux packaging dependencies
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            debhelper \
            devscripts \
            dpkg-dev \
            fakeroot \
            gcc \
            golang-any \
            libasound2-dev \
            libflac-dev \
            libogg-dev \
            libvorbis-dev \
            pkgconf

      - name: Download source bundle
        uses: actions/download-artifact@v4
        with:
          name: source-bundle
          path: dist

      - name: Build Debian packages
        run: |
          scripts/release/build-deb.sh \
            --source-bundle "dist/${{ needs.prepare.outputs.source_bundle_name }}" \
            --series "${{ matrix.series }}" \
            --build-mode both \
            --output-dir dist

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts-${{ matrix.series }}
          path: |
            dist/*.deb
            dist/*.changes
            dist/*.buildinfo
            dist/*.dsc
            dist/*.tar.*

  build-arch:
    needs: prepare
    runs-on: ubuntu-24.04
    container:
      image: archlinux:base-devel

    steps:
      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            alsa-lib \
            flac \
            gcc \
            git \
            go \
            libogg \
            libvorbis \
            tar

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download source bundle
        uses: actions/download-artifact@v4
        with:
          name: source-bundle
          path: dist

      - name: Extract bundled source archive
        run: |
          mkdir -p bundle
          tar -C bundle -xzf "dist/${{ needs.prepare.outputs.source_bundle_name }}"

      - name: Build Arch tarball
        run: |
          scripts/release/build-arch-tarball.sh \
            --source-dir "bundle/${{ needs.prepare.outputs.source_bundle_dir }}" \
            --daemon-source-dir "bundle/${{ needs.prepare.outputs.source_bundle_dir }}/third_party/go-librespot" \
            --output-dir dist

      - name: Upload Arch artifacts
        uses: actions/upload-artifact@v4
        with:
          name: arch-artifacts
          path: dist/lazyspotify-v*-arch-amd64.tar.gz

  build-rpm:
    needs: prepare
    runs-on: ubuntu-24.04
    container:
      image: fedora:42

    steps:
      - name: Install Fedora build dependencies
        run: |
          dnf install -y \
            alsa-lib-devel \
            findutils \
            flac-devel \
            gcc \
            git \
            go \
            libogg-devel \
            libvorbis-devel \
            rpm-build \
            tar

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download source bundle
        uses: actions/download-artifact@v4
        with:
          name: source-bundle
          path: dist

      - name: Build RPM package
        run: |
          scripts/release/build-rpm.sh \
            --source-bundle "dist/${{ needs.prepare.outputs.source_bundle_name }}" \
            --source-commit "${{ needs.prepare.outputs.source_commit }}" \
            --build-date "${{ needs.prepare.outputs.build_date }}" \
            --output-dir dist

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-artifacts
          path: |
            dist/*.rpm
            dist/*.src.rpm

  build-macos:
    needs: prepare
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-14
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install build dependencies
        run: brew install flac libogg libvorbis pkgconf

      - name: Download source bundle
        uses: actions/download-artifact@v4
        with:
          name: source-bundle
          path: dist

      - name: Extract bundled source archive
        run: |
          mkdir -p bundle
          tar -C bundle -xzf "dist/${{ needs.prepare.outputs.source_bundle_name }}"

      - name: Detect Apple signing configuration
        id: apple_signing
        env:
          APPLE_DEVELOPER_ID_APP_CERT_B64: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_B64 }}
        run: |
          if [[ -n "${APPLE_DEVELOPER_ID_APP_CERT_B64}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare signing identity
        if: ${{ steps.apple_signing.outputs.enabled == 'true' }}
        run: |
          echo "${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_B64 }}" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_PASSWORD }}" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Detect Apple notarization configuration
        id: apple_notary
        env:
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
        run: |
          if [[ -n "${APPLE_NOTARY_APPLE_ID}" && -n "${APPLE_NOTARY_TEAM_ID}" && -n "${APPLE_NOTARY_APP_PASSWORD}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "profile=lazyspotify-notary" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "profile=" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure notary profile
        if: ${{ steps.apple_notary.outputs.enabled == 'true' }}
        run: |
          xcrun notarytool store-credentials lazyspotify-notary \
            --apple-id "${{ secrets.APPLE_NOTARY_APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_NOTARY_TEAM_ID }}" \
            --password "${{ secrets.APPLE_NOTARY_APP_PASSWORD }}"

      - name: Build signed macOS archive
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_CERT_COMMON_NAME }}
          MACOS_NOTARY_PROFILE: ${{ steps.apple_notary.outputs.profile }}
        run: |
          scripts/release/build-macos-archive.sh \
            --source-dir "bundle/${{ needs.prepare.outputs.source_bundle_dir }}" \
            --daemon-source-dir "bundle/${{ needs.prepare.outputs.source_bundle_dir }}/third_party/go-librespot" \
            --arch "${{ matrix.arch }}" \
            --output-dir dist

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: dist/*.zip

  draft-release:
    needs:
      - prepare
      - build-linux
      - build-arch
      - build-rpm
      - build-macos
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Stage release assets
        run: |
          mkdir -p release
          cp dist/*.deb release/
          cp dist/*-arch-amd64.tar.gz release/
          find dist -maxdepth 1 -name '*.rpm' ! -name '*.src.rpm' -exec cp -t release/ {} +
          cp dist/*.zip release/
          cp dist/*-src.tar.gz release/

      - name: Generate SHA256SUMS
        run: scripts/release/generate-sha256sums.sh release

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*

  update-homebrew-tap:
    needs:
      - prepare
      - draft-release
    runs-on: macos-14

    steps:
      - name: Detect Homebrew tap token
        id: homebrew_gate
        env:
          HOMEBREW_TAP_REPO_TOKEN: ${{ secrets.HOMEBREW_TAP_REPO_TOKEN }}
        run: |
          if [[ -n "${HOMEBREW_TAP_REPO_TOKEN}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source repo
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Set up Go
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download source bundle
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: source-bundle
          path: dist

      - name: Render formula
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        run: |
          scripts/release/render-homebrew-formula.sh \
            --source-bundle "dist/${{ needs.prepare.outputs.source_bundle_name }}" \
            --build-date "${{ needs.prepare.outputs.build_date }}" \
            --commit "${{ needs.prepare.outputs.source_commit }}" \
            --output rendered/lazyspotify.rb

      - name: Prepare tap repo
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        env:
          HOMEBREW_TAP_REPO_TOKEN: ${{ secrets.HOMEBREW_TAP_REPO_TOKEN }}
        run: |
          git init tap-repo
          cd tap-repo
          git remote add origin "https://x-access-token:${HOMEBREW_TAP_REPO_TOKEN}@github.com/dubeyKartikay/homebrew-lazyspotify.git"
          if git ls-remote --exit-code --heads origin main >/dev/null 2>&1; then
            git fetch --depth=1 origin main
            git checkout -B main origin/main
          else
            git checkout --orphan main
          fi

      - name: Push formula update
        if: ${{ steps.homebrew_gate.outputs.enabled == 'true' }}
        run: |
          mkdir -p tap-repo/Formula
          cp rendered/lazyspotify.rb tap-repo/Formula/lazyspotify.rb
          cd tap-repo
          if [[ -z "$(git status --porcelain)" ]]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lazyspotify.rb
          git commit -m "lazyspotify: release ${{ needs.prepare.outputs.release_tag }}"
          git push origin HEAD:main

  update-aur:
    needs:
      - prepare
      - build-arch
      - draft-release
    runs-on: ubuntu-24.04

    steps:
      - name: Detect AUR SSH key
        id: aur_gate
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          if [[ -n "${AUR_SSH_PRIVATE_KEY}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source repo
        if: ${{ steps.aur_gate.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Download Arch artifacts
        if: ${{ steps.aur_gate.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: arch-artifacts
          path: dist

      - name: Render AUR metadata
        if: ${{ steps.aur_gate.outputs.enabled == 'true' }}
        run: |
          scripts/release/render-aur-metadata.sh \
            --archive "dist/lazyspotify-v${{ needs.prepare.outputs.release_version }}-arch-amd64.tar.gz" \
            --pkgbuild-output rendered/PKGBUILD \
            --srcinfo-output rendered/.SRCINFO

      - name: Configure SSH key
        if: ${{ steps.aur_gate.outputs.enabled == 'true' }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push AUR update
        if: ${{ steps.aur_gate.outputs.enabled == 'true' }}
        env:
          GIT_SSH_COMMAND: ssh -F ~/.ssh/config
        run: |
          git clone ssh://aur@aur.archlinux.org/lazyspotify-bin.git aur-repo
          cp rendered/PKGBUILD aur-repo/PKGBUILD
          cp rendered/.SRCINFO aur-repo/.SRCINFO
          cd aur-repo
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ needs.prepare.outputs.release_tag }}"
          git push origin HEAD

  upload-ppa:
    needs:
      - draft-release
      - build-linux
    runs-on: ubuntu-24.04

    steps:
      - name: Detect Launchpad configuration
        id: ppa_gate
        env:
          LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA }}
          LAUNCHPAD_GPG_PRIVATE_KEY: ${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}
          LAUNCHPAD_GPG_KEY_ID: ${{ secrets.LAUNCHPAD_GPG_KEY_ID }}
        run: |
          if [[ -n "${LAUNCHPAD_PPA}" && -n "${LAUNCHPAD_GPG_PRIVATE_KEY}" && -n "${LAUNCHPAD_GPG_KEY_ID}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install upload dependencies
        if: ${{ steps.ppa_gate.outputs.enabled == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y dput devscripts gnupg

      - name: Download Linux artifacts
        if: ${{ steps.ppa_gate.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          pattern: linux-artifacts-*
          merge-multiple: true
          path: dist

      - name: Import Launchpad signing key
        if: ${{ steps.ppa_gate.outputs.enabled == 'true' }}
        run: |
          install -m 700 -d ~/.gnupg
          printf 'pinentry-mode loopback\n' > ~/.gnupg/gpg.conf
          echo "${{ secrets.LAUNCHPAD_GPG_PRIVATE_KEY }}" | base64 --decode | \
            gpg --batch --pinentry-mode loopback --passphrase "${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}" --import

      - name: Sign and upload source package
        if: ${{ steps.ppa_gate.outputs.enabled == 'true' }}
        env:
          LAUNCHPAD_PPA: ${{ secrets.LAUNCHPAD_PPA }}
        run: |
          if [[ ! "${LAUNCHPAD_PPA}" =~ ^[^/]+/[^/]+$ ]]; then
            echo "LAUNCHPAD_PPA must be set to 'owner/archive', for example 'dubeykartikay/lazyspotify'." >&2
            exit 1
          fi

          mapfile -t changes_files < <(find dist -maxdepth 1 -name '*source.changes' | sort)
          if [[ "${#changes_files[@]}" -eq 0 ]]; then
            echo "No source package .changes files were found in dist/." >&2
            exit 1
          fi

          for changes_file in "${changes_files[@]}"; do
            debsign -k"${{ secrets.LAUNCHPAD_GPG_KEY_ID }}" -p"gpg --batch --pinentry-mode loopback --passphrase ${{ secrets.LAUNCHPAD_GPG_PASSPHRASE }}" "${changes_file}"
            dput "ppa:${LAUNCHPAD_PPA}" "${changes_file}"
          done

  submit-copr:
    needs:
      - draft-release
      - build-rpm
    runs-on: ubuntu-24.04

    steps:
      - name: Detect COPR configuration
        id: copr_gate
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
          COPR_PROJECT: ${{ secrets.COPR_PROJECT }}
        run: |
          if [[ -n "${COPR_CONFIG}" && -n "${COPR_PROJECT}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install copr-cli
        if: ${{ steps.copr_gate.outputs.enabled == 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y copr-cli

      - name: Configure COPR
        if: ${{ steps.copr_gate.outputs.enabled == 'true' }}
        run: |
          install -m 700 -d ~/.config
          printf '%s\n' "${{ secrets.COPR_CONFIG }}" > ~/.config/copr
          chmod 600 ~/.config/copr

      - name: Download RPM artifacts
        if: ${{ steps.copr_gate.outputs.enabled == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: rpm-artifacts
          path: dist

      - name: Submit source RPM to COPR
        if: ${{ steps.copr_gate.outputs.enabled == 'true' }}
        run: |
          copr-cli build "${{ secrets.COPR_PROJECT }}" "$(find dist -maxdepth 1 -name '*.src.rpm' | head -n 1)"

  publish:
    needs:
      - draft-release
      - update-homebrew-tap
      - update-aur
      - upload-ppa
      - submit-copr
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-24.04

    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
