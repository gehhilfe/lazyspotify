name: Feature request
description: Suggest an improvement or new capability for lazyspotify
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow or limitation are you trying to improve?
      placeholder: I want to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Describe any alternative approaches or workarounds you tried.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Mockups, examples, related projects, or other context.
